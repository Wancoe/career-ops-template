# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # [CUSTOMIZE] Add keywords matching YOUR target roles
    - "Diretor"
    - "Direção"
    - "Cinematográfica"
    - "Produtor"
    - "Audiovisual"
    - "Videomaker"
    - "Motion Designer"
    - "Motion"
    - "Design"
    - "Design Gráfico"
    - "Graphic Designer"
    - "Fotografia"
    - "Fotógrafo"
    - "Comunicação"
    - "Comunicação Interna"
    - "Conteúdo"
    - "Content"
    - "Content Strategist"
    - "Copywriter"
    - "Criação"
    - "Produção"
    - "Multimídia"
    - "Animação"
    - "Edição"
    - "Roteiro"
    - "Storyboard"
    - "Art Director"
    - "Diretor de Arte"
    - "Creative Director"
    - "Diretor Criativo"
    - "Brand Strategist"
    - "Branding"
    - "Marca"
    - "Social Media Manager"
    - "Social Media"
    - "Redes Sociais"
    - "Marketing"
    - "Digital"
    - "Publicidade"
    - "Agência"
    - "Propaganda"
    - "Cinema"
    - "Filme"
    - "Documentário"
    - "Produção de Vídeo"
    - "Vídeo"
  negative:
    # [CUSTOMIZE] Add keywords for roles you want to exclude
    - "Junior"
    - "Estágio"
    - "Trainee"
    - "Desenvolvedor"
    - "Developer"
    - "Programador"
    - "Engineer"
    - "Engenheiro"
    - ".NET"
    - "Java "
    - "Python"
    - "JavaScript"
    - "React"
    - "Node.js"
    - "Sales"
    - "Vendas"
    - "Account"
    - "Contas"
  seniority_boost:
    # These prefixes add relevance but are not required
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.

search_queries:
  - name: LinkedIn Brasil — Creative & Audiovisual
    query: 'site:linkedin.com/jobs "Diretor de Arte" OR "Diretor Criativo" OR "Produtor Audiovisual" OR "Motion Designer" OR "Copywriter" OR "Social Media Manager" OR "Brand Strategist" OR "Content Strategist" OR "Videomaker" Brazil remote'
    enabled: true

  - name: Vagas.com.br — Criação e Comunicação
    query: 'site:vagas.com.br "Diretor de Arte" OR "Diretor Criativo" OR "Produtor Audiovisual" OR "Motion Designer" OR "Copywriter" OR "Social Media" OR "Fotógrafo" OR "Content Strategist"'
    enabled: true

  - name: Catho — Marketing e Conteúdo
    query: 'site:catho.com.br "Diretor de Arte" OR "Diretor Criativo" OR "Produtor Audiovisual" OR "Motion Designer" OR "Copywriter" OR "Social Media" OR "Brand Strategist" OR "Content Strategist"'
    enabled: true

  - name: Indeed Brasil — Audiovisual e Criação
    query: 'site:br.indeed.com "Diretor de Arte" OR "Diretor Criativo" OR "Produtor Audiovisual" OR "Motion Designer" OR "Copywriter" OR "Social Media Manager" OR "Graphic Designer" OR "Content Strategist"'
    enabled: true

  - name: Behance Jobs — Creative Roles
    query: 'site:behance.net/joblist "Motion Designer" OR "Art Director" OR "Graphic Designer" OR "Creative Director" OR "Copywriter" OR "Video Producer" remote'
    enabled: true

  - name: Dribbble Jobs — Design & Motion
    query: 'site:dribbble.com/jobs "Motion Designer" OR "Art Director" OR "Graphic Designer" OR "Creative Director" OR "Videomaker" remote'
    enabled: true

  - name: Remote Work — Creative & Marketing
    query: '"Remote" "Creative Director" OR "Motion Designer" OR "Video Producer" OR "Content Strategist" OR "Social Media Manager" OR "Copywriter" OR "Brand Strategist"'
    enabled: true

  - name: Workana — Freelance Audiovisual
    query: 'site:workana.com "Motion Designer" OR "Videomaker" OR "Copywriter" OR "Social Media" OR "Designer Gráfico"'
    enabled: true

  - name: Glassdoor Brasil — Creative Roles
    query: 'site:glassdoor.com.br "Diretor de Arte" OR "Diretor Criativo" OR "Produtor Audiovisual" OR "Motion Designer" OR "Copywriter" OR "Social Media Manager"'
    enabled: true

  - name: RemoteOK — Creative Remote
    query: 'site:remoteok.io "Creative Director" OR "Motion Designer" OR "Video Producer" OR "Content Strategist" OR "Social Media Manager"'
    enabled: true

