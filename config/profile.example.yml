# Career-Ops Profile Configuration
# Copy this file to config/profile.yml and fill in your details.
# This is the single source of truth for your personal data across all modes.

candidate:
  full_name: "Your Name"
  email: "you@example.com"
  phone: "+55-11-99999-9999"
  location: "Your City, State"
  linkedin: "linkedin.com/in/your-profile"
  portfolio_url: "https://your-portfolio.example.com"
  github: "github.com/your-username"
  twitter: "https://x.com/your-handle"

target_roles:
  primary:
    - "Creative Director"
    - "Audiovisual Producer"
    - "Visual Storyteller"
  archetypes:
    - name: "Creative Director"
      level: "Senior"
      fit: "primary"
    - name: "Audiovisual Producer"
      level: "Senior"
      fit: "primary"
    - name: "Motion Designer"
      level: "Mid-Senior"
      fit: "secondary"
    - name: "Content Director"
      level: "Senior"
      fit: "adjacent"

narrative:
  headline: "Creative director and audiovisual storyteller with experience in branded content and campaigns"
  exit_story: "I create high-impact audiovisual content that connects brands and audiences through narrative-driven production."
  superpowers:
    - "Creative direction and visual storytelling"
    - "Audiovisual production and team coordination"
    - "Motion design and post-production"
    - "Brand communication and campaign execution"
  proof_points:
    - name: "Branded Campaign"
      url: "https://your-portfolio.example.com/project-a"
      hero_metric: "Increased brand awareness by 40%"
    - name: "Institutional Video"
      url: "https://your-portfolio.example.com/project-b"
      hero_metric: "2M+ views and high employee engagement"
    - name: "Creative Campaign"
      url: "https://your-portfolio.example.com/project-c"
      hero_metric: "Improved internal communication adoption by 30%"

compensation:
  target_range: "R$ 8.000-12.000"
  currency: "BRL"
  minimum: "R$ 6.000"
  location_flexibility: "Remote preferred, open to hybrid arrangements"

location:
  country: "Brazil"
  city: "Your City"
  timezone: "BRT"
  visa_status: "Brazilian citizen"
