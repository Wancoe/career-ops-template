  proof_points:
    - name: "Produção de Vídeo Institucional"
      url: "https://sandrocoelho.com/projeto-institucional"
      hero_metric: "2M+ visualizações, 95% engajamento"
    - name: "Campanha Publicitária"
      url: "https://sandrocoelho.com/campanha-marca"
      hero_metric: "Aumento de 40% no reconhecimento da marca"
    - name: "Projeto de Comunicação Interna"
      url: "https://sandrocoelho.com/comunicacao-interna"
      hero_metric: "Redução de 60% no turnover de funcionários"
