      fit: "primary"        # primary = dream role, secondary = good fit, adjacent = stretch
    - name: "Produtor Audiovisual"
      level: "Senior"
      fit: "primary"
    - name: "Videomaker"
      level: "Senior"
      fit: "primary"
    - name: "Motion Designer"
      level: "Mid-Senior"
      fit: "secondary"
    - name: "Criador de Conteúdo"
      level: "Senior"
      fit: "adjacent"

